<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <link href='https://unpkg.com/boxicons@2.1.4/css/boxicons.min.css' rel='stylesheet'>
    <style>
        :root {
            --primary: #20AFA7;
            --bg-light: #f6f8f9;
            --text-dark: #333;
        }

        body {
            font-family: 'Segoe UI', Roboto, sans-serif;
            background-color: var(--bg-light);
            margin: 0; padding: 0;
            overflow-x: hidden;
        }

        /* --- Header & Search --- */
        .header-section {
            background-color: var(--primary);
            height: 200px;
            padding: 15px 20px;
            position: relative;
        }

        .search-row {
            display: flex;
            align-items: center;
            gap: 12px;
            margin-top: 10px;
        }

        .search-bar {
            background: white;
            flex: 1;
            padding: 10px 18px;
            border-radius: 50px;
            display: flex;
            align-items: center;
            box-shadow: 0 4px 10px rgba(0,0,0,0.1);
        }

        .profile-btn {
            width: 38px;
            height: 38px;
            background: white;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            border: 2px solid rgba(255,255,255,0.5);
        }

        /* --- Banner Melayang --- */
        .banner-container {
            margin: -110px 15px 0;
            position: relative;
            z-index: 5;
        }

        .banner-img {
            width: 100%;
            border-radius: 20px;
            box-shadow: 0 10px 25px rgba(0,0,0,0.15);
            display: block;
        }

        /* --- Wallet (Kartu Saldo) --- */
        .wallet-card {
            background: #20AFA7;
            margin: 15px;
            border-radius: 22px;
            padding: 12px;
            display: flex;
            align-items: center;
            box-shadow: 0 8px 20px rgba(32, 175, 167, 0.3);
            color: white;
        }

        .inner-balance {
            background: white;
            color: #333;
            padding: 10px 15px;
            border-radius: 18px;
            min-width: 40%;
        }

        .wallet-nav {
            display: flex;
            flex: 1;
            justify-content: space-around;
            text-align: center;
        }

        .nav-btn {
            display: flex;
            flex-direction: column;
            align-items: center;
            font-size: 10px;
            font-weight: 600;
        }

        .nav-btn i { font-size: 22px; margin-bottom: 4px; }

        /* --- Services Grid --- */
        .services-grid {
            display: grid;
            grid-template-columns: repeat(4, 1fr);
            gap: 20px 10px;
            padding: 15px;
        }

        .item {
            text-align: center;
            text-decoration: none;
            color: #444;
        }

        .icon-box {
            width: 62px;
            height: 62px;
            margin: 0 auto 8px;
            border-radius: 20px;
            display: flex;
            align-items: center;
            justify-content: center;
            position: relative;
        }

        .icon-box img { width: 75%; height: 75%; object-fit: contain; }

        /* Badge Ikon */
        .label-badge {
            position: absolute;
            top: -6px;
            left: -4px;
            background: #111;
            color: white;
            font-size: 8px;
            padding: 2px 6px;
            border-radius: 6px;
            font-weight: bold;
        }

        /* --- Daftar Warna Ikon Sesuai Screenshot --- */
        .bg-ojek { background-color: #E0F2F1; } /* Hijau Muda */
        .bg-mobil { background-color: #E3F2FD; } /* Biru Muda */
        .bg-food { background-color: #FFEBEE; } /* Merah Muda */
        .bg-kirim { background-color: #E8F5E9; } /* Hijau Daun */
        .bg-belanja { background-color: #FFF3E0; } /* Oranye Muda */
        .bg-pijat { background-color: #F3E5F5; } /* Ungu Muda */
        .bg-tagihan { background-color: #E1F5FE; } /* Biru Langit */
        .bg-berbagi { background-color: #FFEBEE; } /* Merah Muda */

    </style>
</head>
<body>

    <div class="header-section">
        <div class="search-row">
            <div class="search-bar">
                <i class='bx bx-search' style="color: #20AFA7; font-size: 20px; margin-right: 10px;"></i>
                <span style="color: #999; font-size: 14px;">Udah makan belum?</span>
            </div>
            <div class="profile-btn">
                <i class='bx bxs-user-circle' style="font-size: 28px; color: #20AFA7;"></i>
            </div>
        </div>
    </div>

    <div class="banner-container">
        <img src="slide.png" class="banner-img">
    </div>

    <div class="wallet-card">
        <div class="inner-balance" onclick="location.href='jagel://fitur/saldo'">
            <div style="display: flex; align-items: center; gap: 5px;">
                <i class='bx bxs-wallet' style="color: #20AFA7;"></i>
                <span style="font-size: 11px; font-weight: bold; color: #555;">GoPay</span>
            </div>
            <div style="font-size: 16px; font-weight: 800; margin: 2px 0;">Rp 26.375</div>
            <div style="font-size: 10px; color: #20AFA7; font-weight: bold;">Tap to top up</div>
        </div>
        <div class="wallet-nav">
            <div class="nav-btn"><i class='bx bx-plus-circle'></i>Top up</div>
            <div class="nav-btn"><i class='bx bx-down-arrow-circle'></i>Withdraw</div>
            <div class="nav-btn"><i class='bx bx-qr-scan'></i>QRCode</div>
        </div>
    </div>

    <div class="services-grid">
        <a href="https://jgjk/p/6a0259418efa0" class="item">
            <div class="icon-box bg-ojek">
                <div class="label-badge">5RB!</div>
                <i class='bx bx-cycling' style="font-size: 30px; color: #20AFA7;"></i>
            </div>
            <span style="font-size: 12px; font-weight: 600;">Ojek</span>
        </a>

        <a href="jagel://screen/mobil" class="item">
            <div class="icon-box bg-mobil">
                <i class='bx bx-car' style="font-size: 30px; color: #1976D2;"></i>
            </div>
            <span style="font-size: 12px; font-weight: 600;">Mobil</span>
        </a>

        <a href="jagel://screen/food" class="item">
            <div class="icon-box bg-food">
                <div class="label-badge">HALAL</div>
                <i class='bx bx-restaurant' style="font-size: 30px; color: #D32F2F;"></i>
            </div>
            <span style="font-size: 12px; font-weight: 600;">Food</span>
        </a>

        <a href="jagel://screen/kirim" class="item">
            <div class="icon-box bg-kirim">
                <i class='bx bx-package' style="font-size: 30px; color: #388E3C;"></i>
            </div>
            <span style="font-size: 12px; font-weight: 600;">Kirim</span>
        </a>
        
        <a href="jagel://screen/belanja" class="item">
            <div class="icon-box bg-belanja">
                <i class='bx bx-shopping-bag' style="font-size: 30px; color: #F57C00;"></i>
            </div>
            <span style="font-size: 12px; font-weight: 600;">Belanja</span>
        </a>

        <a href="jagel://screen/pijat" class="item">
            <div class="icon-box bg-pijat">
                <div class="label-badge">BARU</div>
                <i class='bx bx-body' style="font-size: 30px; color: #7B1FA2;"></i>
            </div>
            <span style="font-size: 12px; font-weight: 600;">Pijat</span>
        </a>

        <a href="jagel://screen/tagihan" class="item">
            <div class="icon-box bg-tagihan">
                <div class="label-badge">HEMAT</div>
                <i class='bx bx-receipt' style="font-size: 30px; color: #0288D1;"></i>
            </div>
            <span style="font-size: 12px; font-weight: 600;">Pulsa</span>
        </a>

        <a href="jagel://screen/berbagi" class="item">
            <div class="icon-box bg-berbagi">
                <i class='bx bx-heart' style="font-size: 30px; color: #E91E63;"></i>
            </div>
            <span style="font-size: 12px; font-weight: 600;">Berbagi</span>
        </a>
    </div>

</body>
</html>
